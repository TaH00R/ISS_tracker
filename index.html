<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISS Live Tracker</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050505;

      --panel-bg: rgba(15, 15, 15, 0.78);

      --panel-border: rgba(255, 255, 255, 0.08);

      --accent: #ffffff;

      --accent2: #d4d4d4;

      --warn: #f59e0b;

      --text: #f5f5f5;

      --text-dim: #8a8a8a;

      --mono: 'JetBrains Mono', monospace;

      --sans: Inter, system-ui, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: var(--sans);
      color: var(--text);
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #telemetry {
  position: fixed;

  top: 50%;
  right: 32px;

  transform: translateY(-50%);

  z-index: 10;

  width: 300px;

  background: var(--panel-bg);

  border: 1px solid var(--panel-border);

  border-radius: 16px;

  padding: 24px;

  backdrop-filter: blur(8px);

  -webkit-backdrop-filter: blur(8px);

  box-shadow:
    0 20px 40px rgba(0,0,0,.35);
}

    #telemetry .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--panel-border);
    }

    #telemetry .iss-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    #telemetry h1 {
  font-size: 12px;

  font-weight: 700;

  letter-spacing: 0.18em;

  text-transform: uppercase;

  color: white;
}

    

    .telem-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .telem-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .telem-value {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .telem-value.highlight {
      color: var(--accent2);
    }

    .telem-value.alt {
      color: var(--warn);
    }

    .telem-divider {
      border: none;
      border-top: 1px solid var(--panel-border);
      margin: 14px 0;
    }

    #ts {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.05em;
    }

    #status-bar {
  position: fixed;

  bottom: 24px;

  left: 50%;

  transform: translateX(-50%);

  background: rgba(15,15,15,.78);

  border: 1px solid rgba(255,255,255,.08);

  border-radius: 999px;

  padding: 10px 24px;

  color: var(--text-dim);

  backdrop-filter: blur(8px);

  box-shadow:
    0 10px 30px rgba(0,0,0,.25);
}

    #status-bar span {
      color: var(--accent);
    }

    #cam-controls {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }



    #tle-status {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--text-dim);
      text-align: center;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    #tle-status.stale {
      color: var(--warn);
    }

    #tle-status.live {
      color: var(--accent2);
    }
  </style>
  <script type="module" crossorigin src="/ISS_tracker/assets/index-BAF1zXWx.js"></script>
</head>

<body>

  <div id="canvas-container"></div>


  <div id="telemetry">
    <div class="panel-header">
      <svg class="iss-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="12" y="6" width="4" height="16" rx="1" fill="#00c8ff" opacity="0.9" />
        <rect x="4" y="11" width="20" height="6" rx="1" fill="#00c8ff" opacity="0.7" />
        <rect x="0" y="12" width="8" height="4" rx="1" fill="#00ffc8" opacity="0.8" />
        <rect x="20" y="12" width="8" height="4" rx="1" fill="#00ffc8" opacity="0.8" />
        <rect x="2" y="10" width="4" height="8" rx="0.5" fill="none" stroke="#00ffc8" stroke-width="0.5"
          opacity="0.5" />
        <rect x="22" y="10" width="4" height="8" rx="0.5" fill="none" stroke="#00ffc8" stroke-width="0.5"
          opacity="0.5" />
        <circle cx="14" cy="14" r="2" fill="#ffffff" opacity="0.9" />
      </svg>
      <h1>ISS Tracker</h1>
      <span
  style="
    margin-left:auto;
    font-size:10px;
    color:#888;
    letter-spacing:.15em;
  "
>
  LIVE
</span>
    </div>

    <div class="telem-row">
      <span class="telem-label">Latitude</span>
      <span class="telem-value highlight" id="t-lat">–</span>
    </div>
    <div class="telem-row">
      <span class="telem-label">Longitude</span>
      <span class="telem-value highlight" id="t-lon">–</span>
    </div>
    <hr class="telem-divider" />
    <div class="telem-row">
      <span class="telem-label">Altitude</span>
      <span class="telem-value alt" id="t-alt">–</span>
    </div>
    <div class="telem-row">
      <span class="telem-label">Velocity</span>
      <span class="telem-value" id="t-vel">–</span>
    </div>
    <hr class="telem-divider" />
    <div id="ts">–</div>
    <div id="tle-status"></div>
  </div>

  <div id="status-bar">
    Orbit period ≈ <span>92 min</span> &nbsp;·&nbsp; Inclination <span>51.6°</span> &nbsp;·&nbsp; Altitude <span>~420
      km</span>
  </div>

</body>

</html>
